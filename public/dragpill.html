<!doctype html>
<!-- The floating tab pill shown while a tab is dragged BETWEEN windows (see
     lib.rs show_drag_pill): a webview element can't be rendered outside its
     own window, so the in-flight tab is its own tiny transparent
     click-through window instead. Self-contained on purpose - it's created
     and destroyed per drag, reads its title/dirty state from its URL query,
     and never touches the Tauri API. -->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        cursor: grabbing;
      }
      .pill {
        box-sizing: border-box;
        display: flex;
        align-items: center;
        gap: 6px;
        height: 30px;
        margin: 2px;
        padding: 0 14px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        background: #f5f4f0;
        color: #333;
        font:
          13px -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
      }
      .title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .dot {
        flex: none;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #d98a3d;
      }
      @media (prefers-color-scheme: dark) {
        .pill {
          background: #3a3a3a;
          color: #ddd;
          border-color: rgba(255, 255, 255, 0.15);
        }
      }
    </style>
  </head>
  <body>
    <div class="pill">
      <span class="dot" id="dot" style="display: none"></span>
      <span class="title" id="title"></span>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      document.getElementById("title").textContent = params.get("title") || "";
      if (params.get("dirty") === "1") document.getElementById("dot").style.display = "";
    </script>
  </body>
</html>
