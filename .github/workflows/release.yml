name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts (latest.json + .sig files) so
          # installed apps can verify downloads against the pubkey baked
          # into tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (Gatekeeper). tauri-action
          # imports the base64 .p12 into a temp keychain; the bundler then
          # signs the .app with hardened runtime, notarizes the DMG with
          # notarytool, and staples the ticket. All six secrets must be set
          # together - a partially-configured set fails the macOS build
          # rather than shipping an unsigned DMG.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Levis ${{ github.ref_name }}"
          # Publish immediately on tag - a draft release's latest.json is
          # invisible to the in-app updater, so drafts left unpublished
          # silently stall every user on the previous version.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Points the Homebrew cask (CatVinci-Studio/homebrew-tap) at the DMG this
  # release just published, so `brew install --cask catvinci-studio/tap/levis`
  # always serves the newest version. Pushes via a write deploy key on the
  # tap repo (GITHUB_TOKEN can't push to another repository).
  update-homebrew-tap:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Update cask version and sha256
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [ -z "$TAP_DEPLOY_KEY" ]; then
            echo "TAP_DEPLOY_KEY not set - skipping tap update"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL -o levis.dmg \
            "https://github.com/CatVinci-Studio/Levis/releases/download/${GITHUB_REF_NAME}/Levis_${VERSION}_aarch64.dmg"
          SHA=$(sha256sum levis.dmg | cut -d' ' -f1)
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key"
          git clone git@github.com:CatVinci-Studio/homebrew-tap.git
          cd homebrew-tap
          sed -i "s|^  version \".*\"|  version \"${VERSION}\"|" Casks/levis.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" Casks/levis.rb
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -am "levis ${VERSION}"
          git push
