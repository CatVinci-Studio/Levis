name: Notarization Status

on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/notarization-status.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  status:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Query Apple notarization history
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for name in APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json > notarization-history.json

          jq . notarization-history.json

          submission_id="$(jq -r '.history[0].id // empty' notarization-history.json)"
          if [ -z "$submission_id" ]; then
            echo "No notarization submissions found" >&2
            exit 1
          fi

          echo "Latest submission: $submission_id"
          xcrun notarytool info "$submission_id" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
